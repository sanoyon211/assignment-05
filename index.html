<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker – Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style type="text/tailwindcss">
      * { font-family: 'Inter', sans-serif; }
      @keyframes shake {
        0%,100%{ transform: translateX(0); }
        20%{ transform: translateX(-8px); }
        40%{ transform: translateX(8px); }
        60%{ transform: translateX(-5px); }
        80%{ transform: translateX(5px); }
      }
      .shake { animation: shake 0.4s ease; }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-10">

      <!-- Logo + Title -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16  rounded-full flex items-center justify-center mb-5 shadow-lg">
          <img src="assets/github-logo.png" class="w-16 h-16 fill-white" alt="">
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-1">GitHub Issues Tracker</h1>
        <p class="text-sm text-gray-500">Sign in to manage your issues</p>
      </div>

      <!-- Form -->
      <div id="login-form" class="space-y-5">

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
          <input
            id="username"
            type="text"
            placeholder="Enter Username"
            class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 text-sm text-gray-700 outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition-all"
          />
          <p class="text-xs text-indigo-500 font-medium mt-1">Default: admin</p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter Password"
            class="w-full border border-gray-200 bg-gray-50 rounded-xl px-4 py-3 text-sm text-gray-700 outline-none focus:border-indigo-500 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition-all"
          />
          <p class="text-xs text-indigo-500 font-medium mt-1">Default: admin123</p>
        </div>

        <p id="error-msg" class="hidden text-red-600 text-sm bg-red-50 border border-red-200 rounded-xl px-4 py-2.5 font-medium">
          ❌ Invalid username or password!
        </p>

        <button
          id="login-btn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold py-3 rounded-xl text-sm transition-all duration-200 shadow-lg shadow-indigo-200 cursor-pointer"
        >
          Sign In
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-gray-400 font-medium uppercase tracking-wider">OR</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Demo Credentials -->
      <div>
        <p class="text-center text-xs text-gray-400 uppercase tracking-wider font-medium mb-3">Demo Credentials</p>
        <div class="bg-indigo-50 border border-indigo-100 rounded-xl py-4 px-5 text-center space-y-1">
          <p class="text-sm text-gray-700"><span class="font-bold text-gray-900">Username: </span>admin</p>
          <p class="text-sm text-gray-700"><span class="font-bold text-gray-900">Password: </span>admin123</p>
        </div>
      </div>

    </div>

    <script src="login.js"></script>
  </body>
</html>
