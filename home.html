<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- DaisyUI + Tailwind CSS + font awesome CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-gray-100 min-h-screen">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
      <div
        class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4"
      >
        <!-- Logo + Site name -->
        <div class="flex items-center gap-3 shrink-0">
          <div class="w-9 h-9 rounded-full flex items-center justify-center">
            <img src="assets/github-logo.png" alt="" />
          </div>
          <span class="text-lg font-bold text-gray-900 hidden sm:block"
            >GitHub Issues Tracker</span
          >
        </div>

        <!-- Search + New Issue button -->
        <div class="flex items-center gap-3 flex-1 justify-end max-w-lg">
          <div class="relative flex-1 min-w-0">
            <i
              class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"
            ></i>

            <input
              id="search-input"
              type="text"
              placeholder="Search issues..."
              class="input input-bordered input-sm w-full pl-9 text-sm focus:outline-primary"
            />
          </div>
          <button class="btn btn-primary btn-sm shrink-0 whitespace-nowrap">
            + New Issue
          </button>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
      <!-- TAB BUTTONS  -->
      <div
        class="bg-white rounded-xl px-5 py-4 mb-4 flex items-center gap-2 shadow-sm border border-gray-200"
      >
        <button
          data-tab="all"
          onclick="switchTab('all')"
          class="tab-btn btn btn-primary btn-sm"
        >
          All
        </button>
        <button
          data-tab="open"
          onclick="switchTab('open')"
          class="tab-btn btn btn-ghost btn-sm text-gray-500"
        >
          Open
        </button>
        <button
          data-tab="closed"
          onclick="switchTab('closed')"
          class="tab-btn btn btn-ghost btn-sm text-gray-500"
        >
          Closed
        </button>
      </div>

      <!-- Status bar + Issues  -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
        <div
          id="spinner"
          class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-3"
          style="display: none"
        >
          <span class="loading loading-spinner loading-lg text-primary"></span>
          <p class="text-sm text-gray-500 font-medium">Loading issues...</p>
        </div>
        <!-- Stats bar -->
        <div
          class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6 border-b-[1px] border-gray-200 pb-4"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center"
            >
              <img src="assets/Aperture.png" alt="" />
            </div>
            <div>
              <p id="issue-count" class="text-xl font-bold text-gray-900">
                0 Issues
              </p>
              <p class="text-xs text-gray-500">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <!-- Open/Closed  -->
          <div class="flex items-center gap-5 text-sm font-medium">
            <span class="flex items-center gap-1.5 text-green-700">
              <span class="w-2.5 h-2.5 bg-green-700 rounded-full"></span> Open
            </span>
            <span class="flex items-center gap-1.5 text-purple-700">
              <span class="w-2.5 h-2.5 bg-purple-700 rounded-full"></span>
              Closed
            </span>
          </div>
        </div>

        <!-- Issues grid -->
        <div
          id="issues-grid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"
        ></div>
      </div>
    </main>

    <div id="modal-overlay" class="modal hidden">
      <div
        class="modal-box w-full max-w-lg max-h-[90vh] overflow-y-auto p-0"
        id="modal-box"
      ></div>

      <div class="modal-backdrop" onclick="closeModal()"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
